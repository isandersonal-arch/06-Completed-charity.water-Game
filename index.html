<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Drop Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-wrapper">
        <h1 class="game-title">Water Drop</h1>
        <p class="game-tagline">Catch the good drops, avoid the bad ones!</p>
        <div class="score-panel">
            <div class="score">Score: <span id="score">0</span></div>
            <button id="reset-btn">Reset</button>
            <div class="timer">Time: <span id="time">30</span>s</div>
        </div>
        
        <div id="start-modal" class="modal">
            <div class="modal-content">
                <h2>Water Drop Game</h2>
                <p>Catch the good drops, avoid the bad ones!</p>
                <button id="start-btn">Start Game</button>
                <p>by img</p>
            </div>
        </div>
        
        <div id="game-container">
        </div>

        <footer class="game-footer">
            <a href="https://www.charitywater.org/about" target="_blank" rel="noopener noreferrer">About Us</a>
            <a href="https://www.charitywater.org/take-action" target="_blank" rel="noopener noreferrer">Take Action</a>
        </footer>
        
        <div id="game-over-modal" class="modal hidden">
            <div class="modal-content">
                <h2 id="game-over-title"></h2>
                <p id="game-over-score"></p>
                <button id="restart-btn">Play Again</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
